<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <title>Trắc nghiệm 50 Từ vựng - Phân tích Hán Việt Siêu Dễ Hiểu</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f6f9; 
            color: #333; 
            margin: 0; 
            padding: 20px; 
            font-size: 16px; 
        }
        .container { max-width: 95%; margin: 0 auto; } 
        h1 { text-align: center; color: #2c3e50; font-size: 1.8em; margin-bottom: 20px; line-height: 1.4;}
        
        .score-banner {
            position: sticky;
            top: 10px;
            background: #27ae60; 
            color: #fff;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
            z-index: 100;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #retry-btn {
            background: #f1c40f;
            color: #2c3e50;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            display: none; 
            transition: 0.3s;
        }
        #retry-btn:hover { background: #f39c12; color: #fff; }

        .category-title {
            font-size: 1.4em;
            color: #2980b9;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 5px;
            margin-top: 30px;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .question-card { 
            background: #fff; 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05); 
            border-top: 5px solid #2980b9; 
        }
        .q-header { 
            font-size: 1.1em; 
            color: #7f8c8d; 
            font-weight: bold; 
            margin-bottom: 10px; 
        }
        .badge {
            background: #ebdef0;
            color: #7d3c98;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            margin-left: 10px;
        }
        .q-word { 
            font-size: 2.6em; 
            font-weight: bold; 
            color: #2c3e50; 
            margin-bottom: 15px; 
            text-align: center; 
            letter-spacing: 1px;
        }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
        
        .opt-btn { 
            padding: 15px; font-size: 1.1em; border: 2px solid #dcdde1; 
            border-radius: 8px; background: #fdfdfd; cursor: pointer; 
            transition: 0.2s; text-align: center; font-weight: bold; color: #2f3640;
        }
        .opt-btn:hover:not(:disabled) { border-color: #3498db; background: #ebf5fb; }
        .opt-btn:disabled { cursor: default; }
        .opt-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
        .opt-btn.wrong { background: #f8d7da; border-color: #e74c3c; color: #721c24; }
        
        .explanation { 
            margin-top: 15px; 
            padding: 15px; 
            border-radius: 8px; 
            background: #fff; 
            border-left: 5px solid #27ae60; 
            line-height: 1.6;
            display: none;
            animation: fadeIn 0.4s ease-in-out;
            box-shadow: 0 0 15px rgba(0,0,0,0.03);
        }

        .correct-ans { 
            color: #27ae60; 
            font-size: 1.3em; 
            display: block; 
            font-weight: bold;
            margin-bottom: 10px;
        }

        .example-box {
            background: #fdf2e9; 
            padding: 12px 15px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
            border-left: 4px solid #e67e22;
        }
        .example-box .kr-ex { 
            font-weight: bold; 
            font-size: 1.15em; 
            color: #d35400;
            display: block;
        }
        .example-box .vn-ex { 
            font-size: 1em; 
            color: #555; 
            margin-top: 5px;
        }

        /* --- PHÂN TÍCH HÁN VIỆT ĐƠN GIẢN --- */
        .han-viet-box {
            background: #e8f8f5; 
            color: #2c3e50; 
            padding: 15px; 
            border-radius: 6px; 
            font-size: 1.05em; 
            border-left: 4px solid #1abc9c;
        }
        .han-viet-box strong { color: #16a085; font-size: 1.1em;}
        .han-viet-box .hv-word { 
            color: #c0392b; 
            font-weight: bold; 
            background: #fadbd8;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .han-viet-box ul { margin: 8px 0 0 0; padding-left: 20px; }
        .han-viet-box li { margin-bottom: 5px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

let allQuestions = [];
data.forEach((item) => {
    let pool = data.filter(x => x.vn !== item.vn);
    pool.sort(() => 0.5 - Math.random());
    
    let distractors = [pool[0].vn, pool[1].vn, pool[2].vn];
    let options = [...distractors, item.vn];
    options.sort(() => 0.5 - Math.random()); 
    
    allQuestions.push({
        id: item.id,
        kr: item.kr,
        cat: item.cat,
        options: options,
        correctIndex: options.indexOf(item.vn),
        answerText: item.vn,
        ex_kr: item.ex_kr,
        ex_vn: item.ex_vn,
        han: item.han
    });
});

let score = 0;
let answeredCount = 0;
let totalQ = 50;
let wrongQuestionIds = []; 
const container = document.getElementById('quiz-container');

function renderQuiz(questionsToRender) {
    container.innerHTML = '';
    let currentCategory = '';

    let sortedQuestions = [...questionsToRender].sort((a, b) => a.cat.localeCompare(b.cat));

    sortedQuestions.forEach((q) => {
        if (q.cat !== currentCategory) {
            currentCategory = q.cat;
            container.innerHTML += `<div class="category-title">📂 CHỦ ĐỀ: ${currentCategory}</div>`;
        }

        let html = `
        <div class="question-card" id="q-card-${q.id}">
            <div class="q-header">CÂU SỐ ${q.id} <span class="badge">${q.cat}</span></div>
            <div class="q-word">${q.kr}</div>
            <div class="options" id="opts-${q.id}">
                ${q.options.map((opt, oIndex) => `
                    <button class="opt-btn" onclick="checkAns(${q.id}, ${oIndex}, this)">${opt}</button>
                `).join('')}
            </div>
            
            <div class="explanation" id="exp-${q.id}">
                <strong class="correct-ans">✅ Đáp án: ${q.answerText}</strong>
                <div class="example-box">
                    <span class="kr-ex">"${q.ex_kr}"</span>
                    <div class="vn-ex">➔ ${q.ex_vn}</div>
                </div>
                <div class="han-viet-box">
                    <strong>💡 Mẹo nhớ từ (Hán Việt):</strong><br>
                    ${q.han}
                </div>
            </div>
        </div>
        `;
        container.innerHTML += html;
    });
}

function checkAns(questionId, selectedIndex, btnElement) {
    const q = allQuestions.find(item => item.id === questionId);
    const optionsDiv = document.getElementById(`opts-${questionId}`);
    const buttons = optionsDiv.querySelectorAll('.opt-btn');
    
    buttons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === q.correctIndex) {
            btn.classList.add('correct');
        } else if (idx === selectedIndex) {
            btn.classList.add('wrong');
        }
    });
    
    answeredCount++;
    if (selectedIndex === q.correctIndex) {
        score++;
    } else {
        if (!wrongQuestionIds.includes(questionId)) {
            wrongQuestionIds.push(questionId);
        }
    }
    
    document.getElementById('score-text').innerText = `Điểm: ${score} / ${answeredCount} (Tổng: ${totalQ})`;
    document.getElementById(`exp-${questionId}`).style.display = 'block';

    if (wrongQuestionIds.length > 0) {
        document.getElementById('retry-btn').style.display = 'inline-block';
    }
}

function retryWrongQuestions() {
    if (wrongQuestionIds.length === 0) return;

    let retryList = allQuestions.filter(q => wrongQuestionIds.includes(q.id));
    renderQuiz(retryList);
    
    score = 0;
    answeredCount = 0;
    totalQ = retryList.length;
    wrongQuestionIds = [];
    document.getElementById('score-text').innerText = `Điểm: 0 / 0 (Đang ôn lại ${totalQ} câu sai)`;
    document.getElementById('retry-btn').style.display = 'none';
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onload = () => {
    renderQuiz(allQuestions);
};
